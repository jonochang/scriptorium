<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scriptorium POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --wine: #6b1c2a;
      --wine-light: #6b2640;
      --wine-dark: #4a1525;
      --gold: #8b6914;
      --gold-light: #e8d99b;
      --gold-pale: #faf3dc;
      --parchment: #f5f1ea;
      --parchment-dark: #ede8df;
      --ink: #3a2f25;
      --ink-light: #6b5e4f;
      --warm-gray: #8a7e6b;
      --success: #2d6b3f;
      --success-light: #eaf5ee;
      --danger: #9e2b2b;
      --danger-light: #fdeaea;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow: 0 1px 3px rgba(58,47,37,0.04), 0 4px 16px rgba(58,47,37,0.03);
      --shadow-lg: 0 8px 32px rgba(58,47,37,0.10);
      --pos-btn: rgba(180,140,160,0.35);
      --pos-btn-border: rgba(200,170,185,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; font-family: "Source Sans 3", "Segoe UI", system-ui, sans-serif; background: linear-gradient(160deg, var(--wine-dark) 0%, #2a0a14 100%); color: #fff; min-height: 100vh; }
    .pos-shell { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .pos-wrap { width: 100%; max-width: 460px; display: grid; gap: 14px; padding: 18px 14px 28px; }
    .card { background: var(--parchment); color: var(--ink); border-radius: var(--radius); padding: 16px; }
    .pos-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 16px 20px; }
    .pos-header__brand { display: grid; gap: 4px; }
    .pos-header__brand-mark { color: rgba(245,241,234,.4); font-size: 12px; }
    .pos-header__title { margin: 0; font-family: "Source Serif 4", Georgia, serif; font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }
    .pos-header__subtitle { color: rgba(245,241,234,.4); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
    .pos-header__meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: end; }
    .pos-header__back { padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(245,241,234,.15); background: rgba(245,241,234,.1); color: rgba(245,241,234,.6); font-size: 11px; font-weight: 600; font-family: "Source Sans 3", "Segoe UI", system-ui, sans-serif; text-decoration: none; }
    .session-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .session-pill { display: inline-flex; align-items: center; gap: 8px; padding: 3px 10px; border-radius: 20px; background: rgba(245,241,234,.1); border: 1px solid rgba(245,241,234,.15); font-size: 11px; font-weight: 600; color: rgba(245,241,234,.6); }
    .section-title { margin: 0 0 12px; font-family: "Source Serif 4", Georgia, serif; font-size: 16px; font-weight: 700; }
    .subtle { margin: 6px 0 0; color: var(--warm-gray); font-size: 13px; line-height: 1.5; }
    .center-shell { min-height: calc(100vh - 46px); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 22px; }
    .pin-head { text-align: center; padding: 10px 10px 0; }
    .pin-cross { font-size: 20px; color: var(--gold); margin-bottom: 4px; }
    .pin-head h1 { margin: 0; font-family: "Source Serif 4", Georgia, serif; font-size: 28px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
    .pin-head p { margin: 6px 0 0; color: rgba(245,241,234,.5); font-size: 13px; }
    .pin-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    .pin-links a,
    .pin-links button { color: rgba(245,241,234,.5); text-decoration: none; font-size: 12px; background: none; border: none; cursor: pointer; font-family: "Source Sans 3", "Segoe UI", system-ui, sans-serif; }
    .pin-forgot { padding: 5px 14px; border: 1px solid rgba(245,241,234,.2) !important; border-radius: 8px; }
    .pin-card { background: rgba(180,140,160,.15); border: 1px solid rgba(200,170,185,.2); border-radius: 16px; padding: 28px 32px 24px; width: 300px; }
    .pin-dots { display: flex; justify-content: center; gap: 12px; margin: 4px 0 24px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 7px; border: 2px solid var(--gold); background: transparent; transition: background .15s; }
    .pin-dot--filled { background: var(--gold); }
    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pin-key { height: 56px; border-radius: 10px; border: 1px solid var(--pos-btn-border); background: var(--pos-btn); color: var(--parchment); font: 600 22px/1 "Source Sans 3", "Segoe UI", system-ui, sans-serif; cursor: pointer; }
    .pin-key--del { font-size: 16px; }
    .pin-status { margin-top: 24px; padding: 14px 24px; background: rgba(245,241,234,.08); border-radius: 10px; max-width: 300px; width: 100%; }
    .pin-status__title { font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
    .pin-status__text { font-size: 13px; color: rgba(245,241,234,.55); }
  </style>
</head>
<body>
  <div class="pos-shell">
    <section class="center-shell">
      <div class="pin-cross">✦</div>
      <h1 class="pin-head-title" style="font-family:'Source Serif 4',Georgia,serif;font-size:28px;font-weight:700;color:#8b6914;letter-spacing:2px">SCRIPTORIUM</h1>
      <p style="font-size:13px;color:rgba(245,241,234,0.5);margin-bottom:36px">Point of Sale</p>
      <div class="pin-card">
        <div class="pin-dots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
        <div class="pin-grid">
          <button class="pin-key" type="button">1</button><button class="pin-key" type="button">2</button><button class="pin-key" type="button">3</button>
          <button class="pin-key" type="button">4</button><button class="pin-key" type="button">5</button><button class="pin-key" type="button">6</button>
          <button class="pin-key" type="button">7</button><button class="pin-key" type="button">8</button><button class="pin-key" type="button">9</button>
          <div></div><button class="pin-key" type="button">0</button><button class="pin-key pin-key--del" type="button">⌫</button>
        </div>
      </div>
      <div class="pin-status">
        <div class="pin-status__title">Shift not started</div>
        <div class="pin-status__text">Enter the four-digit PIN to open the parish till.</div>
      </div>
      <div class="pin-links">
        <button class="pin-forgot">Forgot PIN?</button>
        <a href="/admin">Admin login</a>
      </div>
    </section>
  </div>
</body>
</html>
