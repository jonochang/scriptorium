{% extends "admin/layout.html" %}

{% block body %}
<section class="dashboard-grid dashboard-grid--three">
  <article class="surface-card">
    <p class="divider-title">Reporting window</p>
    <h2 class="section-title">Order filters</h2>
    <div class="form-grid">
      <div><label class="field-label" for="report-from">From</label><input id="report-from" type="date" value="2026-03-01" /></div>
      <div><label class="field-label" for="report-to">To</label><input id="report-to" type="date" value="2026-03-31" /></div>
    </div>
    <div class="button-row">
      <button class="accent-button" type="button" id="admin-refresh">Refresh data</button>
      <button class="ghost-link ghost-link--ink" type="button" id="admin-export">Export</button>
    </div>
    <div id="admin-status" class="notice-panel" aria-live="polite">Loading orders…</div>
  </article>
  <article class="surface-card" style="grid-column: span 2;">
    <div class="button-row button-row--compact" style="justify-content:space-between;margin-top:0;">
      <div><p class="divider-title">Orders</p><h2 class="section-title" style="margin:0;">Order Management</h2></div>
      <button class="ghost-link ghost-link--ink" type="button" id="admin-export-inline">Export</button>
    </div>
    <div class="toolbar-chips">
      <button class="filter-chip filter-chip--active" type="button" data-order-filter="All">All</button>
      <button class="filter-chip" type="button" data-order-filter="POS">POS</button>
      <button class="filter-chip" type="button" data-order-filter="Online">Online</button>
      <button class="filter-chip" type="button" data-order-filter="IOU" id="order-filter-iou-label">IOU (0)</button>
    </div>
    {{ orders_placeholder|safe }}
    <div class="pagination">
      <span class="helper-copy helper-copy--flush">Page 1 of 1</span>
      <div class="pagination-links"><a class="pagination-link pagination-link--active" href="/admin/orders">1</a></div>
    </div>
  </article>
</section>
{% endblock %}

{% block scripts %}
{{ session_script|safe }}
{{ dashboard_script|safe }}
{% endblock %}
