<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ context.page_title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    {{ shared_styles|safe }}
    {{ admin_layout_styles|safe }}
    {{ context.extra_styles|safe }}
  </style>
</head>
<body class="admin-shell">
  <header class="admin-topbar">
    <div class="admin-brand"><span class="admin-brand-mark">✝</span> SCRIPTORIUM</div>
    <a class="ghost-link" href="/catalog" style="font-size:13px;display:flex;align-items:center;gap:6px;padding:6px 16px;border-radius:8px;border:1px solid rgba(245,241,234,0.2);color:rgba(245,241,234,0.7);text-decoration:none">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 12L6 8l4-4"/></svg>
      Back to store
    </a>
  </header>
  <main class="admin-main">
    <div class="admin-content">
      {% block body %}{% endblock %}
    </div>
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
